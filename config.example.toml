[interests]
topics = [
    "dense passage retrieval",
    "retrieval augmented generation",
    "knowledge graphs",
    "LLM reasoning",
    "information extraction",
]
keywords = [
    "retrieval",
    "question answering",
    "contrastive learning",
    "dense retrieval",
    "neural search",
]
# Papers scoring below this threshold (0.0–1.0) are dropped after the filter step
relevance_threshold = 0.6

[sources.arxiv]
categories = ["cs.IR", "cs.CL", "cs.AI"]
max_results = 200
days_back = 1

# ── LLM — two independent model slots ───────────────────────────────────────
#
#  Each slot has its own provider, api_key, model, and max_tokens.
#  provider options: "anthropic" | "openai" | "custom"
#  base_url is required for "custom", optional override for "openai".
#
#  deep      = true  →  download each paper's PDF, extract the first `pdf_chars`
#                        characters, and include them in the analysis prompt.
#                        Produces richer analysis with experimental details.
#  deep      = false →  abstract-only analysis (faster, cheaper).  [default]
#  pdf_chars = N     →  max extracted PDF characters fed to the model. [default: 20000]
#
[llm]
deep      = false
# pdf_chars = 20000

# ① Filter model — cheap & fast; batch-scores paper abstracts for relevance
[llm.filter]
provider   = "openai"
api_key    = "sk-..."
model      = "gpt-4.1-mini"
max_tokens = 4096

# ② Analysis model — strong; reads abstracts (or PDF text in deep mode) per paper
[llm.analysis]
provider   = "custom"
api_key    = "sk-..."
model      = "gpt-5.4"
max_tokens = 8192

# Mix providers across slots — e.g. use a local model for filtering:
# [llm.filter]
# provider   = "custom"
# api_key    = "none"
# base_url   = "http://localhost:11434/v1"
# model      = "qwen2.5:14b"
# max_tokens = 2048

# ── Output ─────────────────────────────────────────────────────────────────────
[output]
output_dir = "./digests"

# ── Email (optional) ───────────────────────────────────────────────────────────
# [email]
# smtp_host    = "smtp.xxx.com"
# smtp_port    = 465
# tls_mode     = "tls"
# username     = "you@xxx.com"
# password_env = "EMAIL_PASSWORD"   # export EMAIL_PASSWORD=<app-password>
# from         = "you@xxx.com"
# to           = ["you@xxx.com"]

# ── Daemon schedule ────────────────────────────────────────────────────────────
[schedule]
time = "08:00"   # UTC Time, you can map it to your local time (e.g, set it to 23:00 for 7:00 Beijing Time)

# ── Retry ──────────────────────────────────────────────────────────────────────
[retry]
max_attempts = 3   # retries for arXiv fetches and LLM API calls (default: 3)
