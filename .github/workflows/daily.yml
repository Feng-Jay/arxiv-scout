name: Daily Digest

on:
  schedule:
    # Runs at 00:00 UTC every day (08:00 Beijing Time)
    # Adjust to your preferred time: https://crontab.guru
    - cron: "00 22 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # Needed to push digest files back to the repo

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Write config.toml from secret
        env:
          CONFIG_TOML: ${{ secrets.CONFIG_TOML }}
        run: |
          echo "$CONFIG_TOML" > config.toml

      - name: Run arxiv-scout
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: cargo run --release -- run

      - name: Commit and push digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          # Only commit if there is something new
          git diff --cached --quiet && echo "No new digest today." || \
            git commit -m "digest: $(date -u +%Y-%m-%d)" && git push
