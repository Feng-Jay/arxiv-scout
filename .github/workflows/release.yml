name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: arxiv-scout-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: arxiv-scout-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: arxiv-scout-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: arxiv-scout-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: arxiv-scout-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          # cross-compile toolchain for aarch64
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/arxiv-scout ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/arxiv-scout.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## 📦 Installation

            Download the binary for your platform and make it executable:

            **macOS / Linux:**
            ```bash
            # macOS Apple Silicon
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/arxiv-scout-macos-aarch64 -o arxiv-scout
            chmod +x arxiv-scout

            # macOS Intel
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/arxiv-scout-macos-x86_64 -o arxiv-scout
            chmod +x arxiv-scout

            # Linux x86_64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/arxiv-scout-linux-x86_64 -o arxiv-scout
            chmod +x arxiv-scout
            ```

            **Windows:** download `arxiv-scout-windows-x86_64.exe` and run directly.

            Then copy and edit the config:
            ```bash
            cp config.example.toml config.toml
            # edit config.toml with your API keys
            ./arxiv-scout run
            ```
